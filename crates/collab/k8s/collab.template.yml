---
apiVersion: v1
kind: Namespace
metadata:
  name: ${ZERMINAL_KUBE_NAMESPACE}

---
kind: Service
apiVersion: v1
metadata:
  namespace: ${ZERMINAL_KUBE_NAMESPACE}
  name: ${ZERMINAL_SERVICE_NAME}
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: "${ZERMINAL_SERVICE_NAME}-${ZERMINAL_KUBE_NAMESPACE}"
    service.beta.kubernetes.io/do-loadbalancer-size-unit: "${ZERMINAL_LOAD_BALANCER_SIZE_UNIT}"
    service.beta.kubernetes.io/do-loadbalancer-tls-ports: "443"
    service.beta.kubernetes.io/do-loadbalancer-certificate-id: ${ZERMINAL_DO_CERTIFICATE_ID}
    service.beta.kubernetes.io/do-loadbalancer-disable-lets-encrypt-dns-records: "true"
spec:
  type: LoadBalancer
  selector:
    app: ${ZERMINAL_SERVICE_NAME}
  ports:
    - name: web
      protocol: TCP
      port: 443
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ${ZERMINAL_KUBE_NAMESPACE}
  name: ${ZERMINAL_SERVICE_NAME}

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ${ZERMINAL_SERVICE_NAME}
  template:
    metadata:
      labels:
        app: ${ZERMINAL_SERVICE_NAME}
    spec:
      containers:
        - name: ${ZERMINAL_SERVICE_NAME}
          image: "${ZERMINAL_IMAGE_ID}"
          args:
            - serve
            - ${ZERMINAL_SERVICE_NAME}
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 1
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 15
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: url
            - name: DATABASE_MAX_CONNECTIONS
              value: "${DATABASE_MAX_CONNECTIONS}"
            - name: ZERMINAL_CLIENT_CHECKSUM_SEED
              valueFrom:
                secretKeyRef:
                  name: zed-client
                  key: checksum-seed
            - name: ZERMINAL_CLOUD_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zed-cloud
                  key: internal-api-key
            - name: LIVEKIT_SERVER
              valueFrom:
                secretKeyRef:
                  name: livekit
                  key: server
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit
                  key: key
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: livekit
                  key: secret
            - name: BLOB_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: access_key
            - name: BLOB_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: secret_key
            - name: BLOB_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: url
            - name: BLOB_STORE_REGION
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: region
            - name: BLOB_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: bucket
            - name: KINESIS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kinesis
                  key: access_key
            - name: KINESIS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kinesis
                  key: secret_key
            - name: KINESIS_STREAM
              valueFrom:
                secretKeyRef:
                  name: kinesis
                  key: stream
            - name: KINESIS_REGION
              valueFrom:
                secretKeyRef:
                  name: kinesis
                  key: region
            - name: BLOB_STORE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: blob-store
                  key: bucket
            - name: RUST_BACKTRACE
              value: "1"
            - name: RUST_LOG
              value: ${RUST_LOG}
            - name: LOG_JSON
              value: "true"
            - name: ZERMINAL_ENVIRONMENT
              value: ${ZERMINAL_ENVIRONMENT}
          securityContext:
            capabilities:
              # TODO - Switch to the more restrictive `PERFMON` capability.
              # This capability isn't yet available in a stable version of Debian.
              add: ["SYS_ADMIN"]
      terminationGracePeriodSeconds: 10
